<meta charset="UTF-8">

<title>ディズニースリーレター検索</title>
<style>
  /* 検索バーのみを際立たせるミニマルデザイン */
  body { 
    font-family: 'Helvetica Neue', Arial, sans-serif; 
    background-color: #f4f6f9; 
    color: #333; 
    max-width: 600px; 
    margin: 0 auto; 
    padding: 10vh 20px 20px 20px; 
  }
  
  /* 検索バー */
  .search-box { 
    width: 100%; 
    padding: 18px 24px; 
    font-size: 18px; 
    border: none; 
    border-radius: 30px; 
    box-sizing: border-box; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: box-shadow 0.3s ease;
  }
  .search-box:focus { 
    outline: none; 
    box-shadow: 0 6px 20px rgba(52, 152, 219, 0.25);
  }

  /* サブ機能：全一覧表示ボタン */
  .toggle-container {
    text-align: center;
    margin-top: 15px;
  }
  .toggle-btn {
    background: none;
    border: none;
    color: #7f8c8d;
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    padding: 5px 10px;
  }
  .toggle-btn:hover {
    color: #3498db;
  }

  /* タブのスタイル（初期は非表示） */
  #tabContainer {
    display: none;
    justify-content: center;
    margin-top: 20px;
    border-bottom: 2px solid #ddd;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    color: #7f8c8d;
    cursor: pointer;
    position: relative;
    outline: none;
  }
  .tab-btn.active {
    color: #3498db;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: #3498db;
    border-radius: 3px 3px 0 0;
  }

  /* 結果表示エリア（初期は非表示） */
  #resultArea {
    display: none;
    margin-top: 20px;
  }

  /* リストのデザイン */
  ul { 
    list-style-type: none; 
    padding: 0; 
    margin: 0;
  }
  li { 
    background: #fff; 
    margin-bottom: 8px; 
    padding: 14px 20px; 
    border-radius: 12px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04); 
  }
  
  .name {
    font-weight: 500;
    font-size: 0.95em;
    line-height: 1.4;
    padding-right: 15px;
  }
  
  .code { 
    font-weight: 900; 
    color: #e74c3c; 
    font-size: 1.15em; 
    background-color: #fdedec;
    padding: 4px 12px;
    border-radius: 6px;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  
  .no-result {
    text-align: center;
    padding: 20px;
    color: #95a5a6;
    display: none;
  }
</style>

    const listElement = document.getElementById('list');
    const searchInput = document.getElementById('searchInput');
    const noResultElement = document.getElementById('noResult');
    const resultArea = document.getElementById('resultArea');
    const toggleBtn = document.getElementById('toggleBtn');
    const tabContainer = document.getElementById('tabContainer');
    const tabBtns = document.querySelectorAll('.tab-btn');

    let isShowingAll = false;
    let currentCategory = "TDL"; // 初期表示のタブ

    // リストを描画する関数
    function renderList(data) {
      listElement.innerHTML = ''; 
      
      if (data.length === 0) {
        noResultElement.style.display = 'block';
      } else {
        noResultElement.style.display = 'none';
        data.forEach(item => {
          const li = document.createElement('li');
          const nameSpan = document.createElement('span');
          nameSpan.className = 'name';
          nameSpan.textContent = item.name;
          const codeSpan = document.createElement('span');
          codeSpan.className = 'code';
          codeSpan.textContent = item.code;
          li.appendChild(nameSpan);
          li.appendChild(codeSpan);
          listElement.appendChild(li);
        });
      }
    }

    // 特定のカテゴリのデータを表示する関数
    function renderCategory(category) {
      const filteredLocations = locations.filter(item => item.category === category);
      renderList(filteredLocations);
    }

    // タブクリック時の処理
    tabBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        // アクティブなタブの見た目を切り替え
        tabBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        // 選択されたカテゴリを取得して再描画
        currentCategory = this.dataset.category;
        renderCategory(currentCategory);
      });
    });

    // 検索入力時の処理
    searchInput.addEventListener('input', function() {
      const filter = searchInput.value.toLowerCase().replace(/　/g, ' '); 
      
      if (filter.length > 0) {
        // 検索時はタブを隠して、全カテゴリから検索
        tabContainer.style.display = 'none';
        resultArea.style.display = 'block';
        
        const filteredLocations = locations.filter(item => {
          return item.name.toLowerCase().includes(filter) || 
                 item.code.toLowerCase().includes(filter);
        });
        renderList(filteredLocations);
        
        isShowingAll = false;
        toggleBtn.textContent = "全ロケーション一覧を表示";
      } else {
        // 検索文字が消えた時の処理
        if (!isShowingAll) {
          resultArea.style.display = 'none';
          tabContainer.style.display = 'none';
        } else {
          // 一覧表示中だった場合は、現在のタブを表示
          tabContainer.style.display = 'flex';
          renderCategory(currentCategory);
        }
      }
    });

    // 「全ロケーション一覧を表示」のトグル処理
    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      isShowingAll = !isShowingAll;
      
      if (isShowingAll) {
        searchInput.value = ''; // 検索バーをリセット
        tabContainer.style.display = 'flex'; // タブを表示
        resultArea.style.display = 'block';
        renderCategory(currentCategory); // 現在のカテゴリを描画
        toggleBtn.textContent = "一覧を閉じる";
      } else {
        tabContainer.style.display = 'none';
        resultArea.style.display = 'none';
        toggleBtn.textContent = "全ロケーション一覧を表示";
      }
    });
  </script>
